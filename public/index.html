<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Task Manager</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <h1><i class="fas fa-tasks"></i> Task Manager</h1>

    <!-- Task Statistics -->
    <div class="task-stats" id="task-stats">
      <div class="stat-card">
        <i class="fas fa-list-ul"></i>
        <div>
          <div class="stat-number" id="total-tasks">0</div>
          <div class="stat-label">Total Tasks</div>
        </div>
      </div>
      <div class="stat-card">
        <i class="fas fa-clock"></i>
        <div>
          <div class="stat-number" id="pending-tasks">0</div>
          <div class="stat-label">Pending</div>
        </div>
      </div>
      <div class="stat-card">
        <i class="fas fa-spinner"></i>
        <div>
          <div class="stat-number" id="in-progress-tasks">0</div>
          <div class="stat-label">In Progress</div>
        </div>
      </div>
      <div class="stat-card">
        <i class="fas fa-check-circle"></i>
        <div>
          <div class="stat-number" id="completed-tasks">0</div>
          <div class="stat-label">Completed</div>
        </div>
      </div>
    </div>

    <div class="task-form">
      <input type="text" id="task-title" placeholder="Task title" required>
      <textarea id="task-description" placeholder="Task description"></textarea>
      <select id="task-status">
        <option value="pending">Pending</option>
        <option value="in-progress">In Progress</option>
        <option value="completed">Completed</option>
      </select>
      <button onclick="addTask()"><i class="fas fa-plus"></i> Add Task</button>
    </div>

    <div class="task-list" id="task-list">
      <!-- Tasks will be loaded here -->
    </div>

    <!-- Progress indicator -->
    <div id="progress-container" style="display: none;">
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
      <p style="text-align: center; margin-top: 10px; color: #666; font-size: 14px;">Processing...</p>
    </div>

  </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
